<!DOCTYPE html>
<html>
<head>
    <title>Visitor Dashboard</title>
</head>
<body>
    <h2>Welcome Visitor</h2>
    <h3>Request a New Pass</h3>
    <form method="POST">
        Type: <input type="text" name="type" required><br>
        Location: <input type="text" name="location" required><br>
        Purpose: <input type="text" name="purpose" required><br>
        <button type="submit">Submit Request</button>
    </form>

    <h3>My Requests</h3>
    <table border="1">
        <tr>
            <th>ID</th><th>Type</th><th>Location</th><th>Purpose</th><th>Status</th>
        </tr>
        {% for req in requests %}
        <tr>
            <td>{{ req.request_id }}</td>
            <td>{{ req.type }}</td>
            <td>{{ req.location }}</td>
            <td>{{ req.purpose }}</td>
            <td>{{ req.status }}</td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
